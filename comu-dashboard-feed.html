<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMU Hub — Feed de Atividades</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f1117;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1d2035;
            border-bottom: 1px solid #de2165;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #de2165;
            letter-spacing: -0.5px;
        }

        .back-btn {
            background-color: #de2165;
            color: #1d2035;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: #ff2d7f;
            transform: translateY(-1px);
        }

        .filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background-color: transparent;
            color: #a0a0a0;
            border: 1px solid #333;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            color: #e0e0e0;
            border-color: #de2165;
        }

        .filter-btn.active {
            background-color: #de2165;
            color: #fff;
            border-color: #de2165;
        }

        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .summary-strip {
            background-color: #1d2035;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            font-size: 0.8rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .summary-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #de2165;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .feed-entry {
            background-color: #1d2035;
            border: 1px solid #333;
            border-left: 4px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .feed-entry:hover {
            border-color: #de2165;
            box-shadow: 0 0 20px rgba(222, 33, 101, 0.1);
        }

        .feed-entry.hidden {
            display: none;
        }

        .feed-entry.alert-yellow {
            border-left-color: #fbbf24;
        }

        .feed-entry.alert-red {
            border-left-color: #ef4444;
        }

        .feed-entry.alert-green {
            border-left-color: #4ade80;
        }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .feed-time {
            font-size: 0.85rem;
            color: #a0a0a0;
            font-weight: 500;
        }

        .feed-agent {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 600;
            color: #de2165;
        }

        .agent-emoji {
            font-size: 1.3rem;
        }

        .feed-department {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-left: 0.5rem;
        }

        .dept-tap-sales {
            background-color: rgba(222, 33, 101, 0.2);
            color: #de2165;
        }

        .dept-cap-ops {
            background-color: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .dept-comercial {
            background-color: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .dept-growth {
            background-color: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }

        .dept-comu-ops {
            background-color: rgba(168, 85, 247, 0.2);
            color: #a855f7;
        }

        .feed-description {
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .feed-details {
            display: none;
            background-color: #151a2f;
            border-top: 1px solid #333;
            margin-top: 1rem;
            padding-top: 1rem;
            font-size: 0.9rem;
            color: #a0a0a0;
            line-height: 1.6;
        }

        .feed-entry.expanded .feed-details {
            display: block;
        }

        .feed-entry.expanded {
            border-color: #de2165;
        }

        .expand-icon {
            transition: transform 0.2s;
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .feed-entry.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .stats-bottom {
            background-color: #1d2035;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #de2165;
        }

        .stat-with-alert {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .alert-badge {
            display: inline-block;
            background-color: #fbbf24;
            color: #1d2035;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .alert-badge.critical {
            background-color: #ef4444;
            color: #fff;
        }

        @media (max-width: 768px) {
            .summary-strip {
                flex-direction: column;
                gap: 1rem;
            }

            .filters {
                gap: 0.5rem;
            }

            .filter-btn {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

        <div class="content">

            <div class="feed" id="feedContainer"></div>

            <div class="stats-bottom">

                    <div class="stat-item">

                    </div>
                    <div class="stat-item">

                    </div>
                    <div class="stat-item">

        </div>
    </div>

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';

            feedData.forEach((entry, index) => {
                const entryEl = document.createElement('div');
                entryEl.className = `feed-entry ${entry.type === 'alert' ? 'alert-yellow' : ''}`;
                entryEl.dataset.dept = entry.dept;

                const deptClass = `dept-${entry.dept}`;
                const deptName = {
                    'tap-sales': 'TAP Sales',
                    'cap-ops': 'CAP Ops',
                    'comercial': 'Comercial',
                    'growth': 'Growth',
                    'comu-ops': 'COMU Ops'
                }[entry.dept];

                entryEl.innerHTML = `
                    <div class="feed-header">
                        <div class="feed-time">[${entry.time}]</div>
                        <div style="flex: 1; margin-left: 1rem;">
                            <div class="feed-agent">
                                <span class="agent-emoji">${entry.emoji}</span>
                                ${entry.agent}
                                <span class="feed-department ${deptClass}">${deptName}</span>
                            </div>
                        </div>
                        <span class="expand-icon">▼</span>
                    </div>
                    <div class="feed-description">${entry.description}</div>
                    <div class="feed-details">${entry.details}</div>
                `;

                entryEl.addEventListener('click', function() {
                    this.classList.toggle('expanded');
                });

                container.appendChild(entryEl);
            });
        }

        function filterByDept(dept, button) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            // Filter entries
            const entries = document.querySelectorAll('.feed-entry');
            entries.forEach(entry => {
                if (dept === 'todos' || entry.dataset.dept === dept) {
                    entry.classList.remove('hidden');
                } else {
                    entry.classList.add('hidden');
                }
            });
        }

        // Initialize on load
        renderFeed();
    </script>
</body>
</html>
